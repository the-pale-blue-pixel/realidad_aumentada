<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJ AR Viewer</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family: monospace;
}

#start {
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:black;
  color:#00ff88;
  z-index:10;
}

button {
  padding:15px 30px;
  background:transparent;
  border:1px solid #00ff88;
  color:#00ff88;
  font-size:14px;
}

video {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:0;
}
</style>
</head>

<body>

<div id="start">
  <h2>VISOR OBJ</h2>
  <button onclick="init()">ACTIVAR</button>
</div>

<video id="video" autoplay playsinline muted></video>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/OBJLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/loaders/MTLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158/examples/js/controls/OrbitControls.js"></script>

<script>

let scene, camera, renderer, controls;

async function init() {

  document.getElementById("start").style.display = "none";

  // 📷 cámara celular
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    const video = document.getElementById("video");
    video.srcObject = stream;

  } catch (e) {
    alert("No se pudo acceder a la cámara");
  }

  // 🎥 Three.js
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    1000
  );
  camera.position.z = 2;

  renderer = new THREE.WebGLRenderer({ alpha:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 🎛 controles (rotar + zoom)
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // 💡 luz
  const light = new THREE.HemisphereLight(0xffffff, 0x444444);
  scene.add(light);

  // 📦 cargar MTL + OBJ
  const mtlLoader = new THREE.MTLLoader();
  mtlLoader.load('mi_modelo.mtl', function(materials) {

    materials.preload();

    const objLoader = new THREE.OBJLoader();
    objLoader.setMaterials(materials);

    objLoader.load('mi_modelo.obj', function(object) {

      object.scale.set(1,1,1);
      scene.add(object);

    });

  });

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

</script>

</body>
</html>
