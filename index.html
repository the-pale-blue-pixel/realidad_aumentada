<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJ AR Viewer</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { position: absolute; top: 0; left: 0; }

#info {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: white;
  font-family: monospace;
  z-index: 10;
}
</style>
</head>

<body>

<div id="info">Inicializando...</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/OBJLoader.js';
import { MTLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/MTLLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';

// ───────── SCENE ─────────
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);

const renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ───────── CONTROLES ─────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableZoom = true;
controls.enablePan = false;
controls.enableDamping = true;

camera.position.set(0, 0, 2);

// ───────── LUZ ─────────
const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// ───────── RUTAS CORRECTAS (CLAVE) ─────────
const OBJ_URL = "/realidad_aumentada/mi_modelo.obj";
const MTL_URL = "/realidad_aumentada/mi_modelo.mtl";

// ───────── CARGA MODELO ─────────
const mtlLoader = new MTLLoader();

mtlLoader.load(MTL_URL,
  (materials) => {

    console.log("✅ MTL cargado");
    materials.preload();

    const objLoader = new OBJLoader();
    objLoader.setMaterials(materials);

    objLoader.load(OBJ_URL,
      (object) => {

        console.log("✅ OBJ cargado");

        // Ajustes críticos
        object.scale.set(0.05, 0.05, 0.05);
        object.position.set(0, 0, -1);

        scene.add(object);

        document.getElementById("info").innerText =
          "Modelo listo ✔ • Arrastra para rotar • Pellizca para zoom";

      },
      (xhr) => {
        console.log("Cargando OBJ:", (xhr.loaded / xhr.total * 100) + "%");
      },
      (error) => {
        console.error("❌ ERROR OBJ:", error);
        document.getElementById("info").innerText = "Error cargando OBJ";
      }
    );
  },
  undefined,
  (error) => {
    console.error("❌ ERROR MTL:", error);
    document.getElementById("info").innerText = "Error cargando MTL";
  }
);

// ───────── CÁMARA ─────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    const video = document.createElement('video');
    video.srcObject = stream;
    video.setAttribute("playsinline", true);
    await video.play();

    const texture = new THREE.VideoTexture(video);
    scene.background = texture;

    console.log("📷 Cámara activada");

  } catch (e) {
    console.error("❌ Error cámara:", e);
    document.getElementById("info").innerText = "Sin acceso a cámara";
  }
}

startCamera();

// ───────── RESIZE ─────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ───────── LOOP ─────────
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
