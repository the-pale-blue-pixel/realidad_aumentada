<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJ Viewer</title>

<style>
body { margin: 0; overflow: hidden; background: black; }
canvas { position: absolute; top: 0; left: 0; }

#info {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  color: white;
  font-family: monospace;
  z-index: 10;
}
</style>
</head>

<body>

<div id="info">Inicializando...</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { OBJLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/OBJLoader.js';
import { MTLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/MTLLoader.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';

// ESCENA
let scene = new THREE.Scene();

let camera = new THREE.PerspectiveCamera(
  70,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);

let renderer = new THREE.WebGLRenderer({ alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// CONTROLES
let controls = new OrbitControls(camera, renderer.domElement);
controls.enableZoom = true;
controls.enablePan = false;
controls.enableDamping = true;

camera.position.set(0, 0, 2);

// LUZ
let light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
scene.add(light);

// ARCHIVOS
const OBJ_URL = "mi_modelo.obj";
const MTL_URL = "mi_modelo.mtl";

// 🔥 SIEMPRE INICIAR CÁMARA PRIMERO
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {

  const video = document.createElement('video');
  video.srcObject = stream;
  video.setAttribute("playsinline", true);
  video.play();

  const texture = new THREE.VideoTexture(video);
  scene.background = texture;

})
.catch(() => {
  document.getElementById("info").innerText = "No se pudo acceder a la cámara";
});

// 🔄 FUNCIÓN DE CARGA FALLBACK
function cargarOBJSinMTL() {

  const loader = new OBJLoader();

  loader.load(OBJ_URL, (object) => {

    object.scale.set(0.5, 0.5, 0.5);

    // MATERIAL BÁSICO PARA ASEGURAR VISIBILIDAD
    object.traverse(child => {
      if (child.isMesh) {
        child.material = new THREE.MeshNormalMaterial();
      }
    });

    scene.add(object);

    document.getElementById("info").innerText = "Arrastra para rotar • Pellizca para zoom";

  }, undefined, () => {

    document.getElementById("info").innerText = "Error cargando OBJ";

  });

}

// 🔄 INTENTO CON MTL
const mtlLoader = new MTLLoader();

mtlLoader.load(MTL_URL, (materials) => {

  materials.preload();

  const objLoader = new OBJLoader();
  objLoader.setMaterials(materials);

  objLoader.load(OBJ_URL, (object) => {

    object.scale.set(0.5, 0.5, 0.5);
    scene.add(object);

    document.getElementById("info").innerText = "Arrastra para rotar • Pellizca para zoom";

  }, undefined, () => {

    // SI FALLA OBJ → fallback
    cargarOBJSinMTL();

  });

}, undefined, () => {

  // SI FALLA MTL → fallback
  cargarOBJSinMTL();

});

// RESPONSIVE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// LOOP
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
